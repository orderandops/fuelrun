<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#085041">
<title>fuel.run</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#f5f5f0;--cd:#fff;--bdr:#ddddd5;
--tx:#1c1b18;--tx2:#888780;--tx3:#b5b3ac;
--acc:#1D9E75;--accL:#E1F5EE;--accD:#0F6E56;
--hero:#085041;--coral:#D85A30;--coralL:#FAECE7;
--blue:#378ADD;--blueL:#E6F1FB;
--purp:#7F77DD;--purpL:#EEEDFE;
--amber:#EF9F27;--amberL:#FAEEDA;
--pink:#D4537E;--pinkL:#FBEAF0;
--f:Sora,sans-serif;--r:10px
}
html,body{font-family:var(--f);color:var(--tx);background:var(--bg);-webkit-tap-highlight-color:transparent;overflow-x:hidden}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:62px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}

/* Header */
.hdr{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:.5px solid var(--bdr);background:var(--cd)}
.logo{font-weight:700;font-size:20px;color:var(--hero)}.logo span{color:var(--coral)}
.hdr-dt{font-size:13px;color:var(--tx2)}

/* Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--cd);border-top:.5px solid var(--bdr);display:flex;z-index:90;padding:4px 0 max(4px,env(safe-area-inset-bottom))}
.nav-i{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;border:none;background:none;font-family:var(--f);font-size:10px;cursor:pointer;font-weight:500;color:var(--tx3)}
.nav-i.on{font-weight:600}
.nav-i svg{width:22px;height:22px}

/* Pages */
.pg{display:none;padding:12px 14px}.pg.on{display:block}

/* Cards */
.cd{background:var(--cd);border:.5px solid var(--bdr);border-radius:var(--r);padding:12px;margin-bottom:8px}
.cd-t{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

/* Hero */
.hero{background:var(--hero);border-radius:12px;padding:14px 16px;margin-bottom:8px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.hero-left .hero-label{font-size:11px;opacity:.7;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.hero-left .hero-num{font-size:26px;font-weight:700;line-height:1.1}
.hero-right{text-align:right;font-size:13px;opacity:.85;line-height:1.5}

/* Tracker bars */
.trk{margin-bottom:6px}
.trk-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.trk-label span:first-child{font-weight:600}
.trk-label span:last-child{color:var(--tx2)}
.trk-bar{height:6px;background:#eee;border-radius:3px;overflow:hidden}
.trk-fill{height:100%;border-radius:3px;transition:width .3s}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:500;white-space:nowrap}

/* Buttons */
.btn{border:none;border-radius:6px;padding:7px 16px;font-family:var(--f);font-size:13px;font-weight:600;cursor:pointer}
.btn-g{background:var(--acc);color:#fff}
.btn-o{background:transparent;border:1px solid var(--bdr);color:var(--tx)}

/* Inputs */
.inp{border:1px solid var(--bdr);border-radius:6px;padding:8px 10px;font-family:var(--f);font-size:15px;width:100%;background:var(--cd)}
.inp-sm{width:52px;text-align:center;padding:6px 4px;font-size:14px}

/* Modal overlay */
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:flex-end}
.modal-bg.on{display:flex}
.modal{background:var(--cd);border-radius:16px 16px 0 0;width:100%;max-width:430px;max-height:85vh;overflow-y:auto;padding:16px;animation:slideUp .2s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.modal-top h3{font-size:17px;font-weight:600}
.modal-x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--tx2);padding:4px}

/* Training card */
.t-card{background:var(--cd);border:.5px solid var(--bdr);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;cursor:grab;touch-action:pan-y}
.t-card.dragging{opacity:.5}
.t-top{display:flex;align-items:center;justify-content:space-between;gap:6px}
.t-day{font-size:15px;font-weight:600;min-width:80px}
.t-day small{font-weight:400;color:var(--tx2);font-size:13px}
.t-actions{display:flex;align-items:center;gap:8px}
.t-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.t-log{margin-top:10px;border-top:.5px solid var(--bdr);padding-top:10px}
.t-log-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.t-log-row .pill{font-size:11px;padding:2px 8px}
.t-done{margin-top:8px;border-top:.5px solid var(--bdr);padding-top:8px}
.t-done-row{display:flex;align-items:center;gap:6px;font-size:13px;padding:3px 0}

/* Nutrition */
.meal-sec{margin-bottom:8px}
.meal-hdr{font-size:13px;font-weight:600;color:var(--tx2);padding:6px 0;border-bottom:.5px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.meal-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid #f0f0ec;font-size:13px}
.meal-item-info{flex:1}
.meal-item-macros{font-size:11px;color:var(--tx2)}
.meal-item-cal{font-weight:600;font-size:14px;min-width:40px;text-align:right}
.meal-item-del{background:none;border:none;color:var(--coral);cursor:pointer;font-size:14px;padding:2px 4px;margin-left:4px}

/* Search */
.search-wrap{position:relative;margin-bottom:8px}
.search-wrap input{padding-right:36px}
.search-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:var(--acc);border:none;border-radius:4px;color:#fff;width:28px;height:28px;cursor:pointer;font-size:14px}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.chip{background:var(--accL);color:var(--accD);border:none;border-radius:12px;padding:5px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--f)}

/* Cal row */
.cal-row{display:flex;gap:2px;margin-bottom:8px;overflow-x:auto}
.cal-day{flex:1;min-width:44px;text-align:center;padding:6px 2px;border-radius:6px;font-size:10px}
.cal-day.today{background:var(--accL);font-weight:600}
.cal-day .cal-n{font-size:12px;font-weight:600;margin-bottom:1px}
.cal-day .cal-v{font-size:13px;font-weight:700}

/* Weight */
.wt-input{display:flex;align-items:center;gap:8px}

/* Week nav */
.wk-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.wk-nav button{background:none;border:none;cursor:pointer;font-size:18px;color:var(--acc);padding:4px 8px}
.wk-nav .wk-label{font-size:14px;font-weight:600}

/* Weekly stats */
.wk-stats{display:flex;gap:6px;margin-bottom:8px}
.wk-stat{flex:1;background:var(--cd);border:.5px solid var(--bdr);border-radius:var(--r);padding:8px;text-align:center}
.wk-stat .wk-sv{font-size:20px;font-weight:700}
.wk-stat .wk-sl{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.3px}

/* Race goals */
.race-card{background:var(--cd);border:.5px solid var(--bdr);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.race-info .race-name{font-size:15px;font-weight:600}
.race-info .race-det{font-size:12px;color:var(--tx2)}
.race-actions{display:flex;gap:6px}
.race-actions button{background:none;border:none;cursor:pointer;font-size:14px;color:var(--tx2)}

/* Barcode */
#barcode-reader{width:100%;max-width:300px;margin:0 auto}
#barcode-reader video{border-radius:8px}

/* Charts */
canvas{display:block;width:100%;border-radius:var(--r)}
</style>
</head>

<script>
// ===== CONFIG =====
const USER={wt:128.5,goalWt:125,ht:170.18,age:40,sex:'F',marathonDate:'2026-11-13',marathonGoal:'3:45:00'};
const WEEK1_START=new Date(2026,3,20); // Apr 20 2026
const DOW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const ACTIVITY_TYPES=['Easy run','Long run','Tempo','Intervals','HIIT','Hike','Bike','Mtn bike','Kayak','Swim','Walk','Yoga','Other'];
const ACT_COLORS={'Easy run':'var(--acc)','Long run':'var(--coral)','Tempo':'var(--acc)','Intervals':'var(--acc)','HIIT':'var(--purp)','Hike':'var(--amber)','Bike':'var(--blue)','Mtn bike':'var(--blue)','Kayak':'var(--accD)','Swim':'var(--blue)','Walk':'var(--acc)','Yoga':'var(--pink)','Other':'var(--tx2)'};
const ACT_BGS={'Easy run':'var(--accL)','Long run':'var(--coralL)','Tempo':'var(--accL)','Intervals':'var(--accL)','HIIT':'var(--purpL)','Hike':'var(--amberL)','Bike':'var(--blueL)','Mtn bike':'var(--blueL)','Kayak':'var(--accL)','Swim':'var(--blueL)','Walk':'var(--accL)','Yoga':'var(--pinkL)','Other':'#eee'};
const MILE_ACTS=['Easy run','Long run','Tempo','Intervals','Hike','Bike','Mtn bike','Walk'];
const TIME_ONLY=['HIIT','Kayak','Swim','Yoga','Other'];
const QUICK_CHIPS=['Banana','Egg','Chicken','Rice','Oatmeal','Greek yogurt','Apple','Protein shake','Sweet potato','Peanut butter'];

// ===== STATE =====
let plan=[];
let curWeek=0;
let meals={Breakfast:[],Lunch:[],Dinner:[],Snacks:[]};
let weightHist=[];
let raceGoals=[];
let currentMealSlot='Breakfast';
let pendingFood=null;
let barcodeScanner=null;

// ===== INDEXEDDB =====
let db;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open('fuelrun',3);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains('kv'))d.createObjectStore('kv')};r.onsuccess=e=>{db=e.target.result;res()};r.onerror=e=>rej(e)})}
function dbGet(k){return new Promise(r=>{const t=db.transaction('kv','readonly').objectStore('kv').get(k);t.onsuccess=()=>r(t.result);t.onerror=()=>r(undefined)})}
function dbSet(k,v){return new Promise(r=>{const t=db.transaction('kv','readwrite').objectStore('kv').put(v,k);t.onsuccess=()=>r();t.onerror=()=>r()})}

async function loadData(){
const m=await dbGet('meals_'+todayStr());
if(m)meals=m; else meals={Breakfast:[],Lunch:[],Dinner:[],Snacks:[]};
const w=await dbGet('weightHist');if(w)weightHist=w;
const rg=await dbGet('raceGoals');if(rg)raceGoals=rg;
const gw=await dbGet('goalWeight');if(gw)USER.goalWt=gw;
const pe=await dbGet('planEdits');
if(pe){pe.forEach(e=>{const wk=plan.find(w=>w.week===e.week);if(wk){const d=wk.days.find(d=>d.dateStr===e.dateStr);if(d){d.activities=e.activities}}});}
const pa=await dbGet('planActuals');
if(pa){pa.forEach(a=>{const wk=plan.find(w=>w.week===a.week);if(wk){const d=wk.days.find(d=>d.dateStr===a.dateStr);if(d)d.actuals=a.actuals}});}
}
async function saveMeals(){await dbSet('meals_'+todayStr(),meals)}
async function saveWeightHist(){await dbSet('weightHist',weightHist)}
async function saveRaces(){await dbSet('raceGoals',raceGoals)}
async function savePlanEdits(){
const edits=[];plan.forEach(wk=>wk.days.forEach(d=>{if(d.edited)edits.push({week:wk.week,dateStr:d.dateStr,activities:d.activities})}));
await dbSet('planEdits',edits);
}
async function savePlanActuals(){
const acts=[];plan.forEach(wk=>wk.days.forEach(d=>{if(d.actuals)acts.push({week:wk.week,dateStr:d.dateStr,actuals:d.actuals})}));
await dbSet('planActuals',acts);
}

// ===== DATE UTILS =====
function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fmtDate(d){return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function daysBetween(a,b){return Math.ceil((b-a)/(1000*60*60*24))}
function dateStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function parseDate(s){const p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2])}

// ===== TRAINING PLAN =====
function buildPlan(){
plan=[];
const baseEnd=new Date(2026,5,30); // Jun 30
const raceDay=new Date(2026,10,13); // Nov 13
const totalWeeks=Math.ceil(daysBetween(WEEK1_START,raceDay)/7);
// Base phase weeks
const baseWeeks=Math.ceil(daysBetween(WEEK1_START,baseEnd)/7);

for(let w=0;w<totalWeeks;w++){
const wkStart=addDays(WEEK1_START,w*7);
const isBase=w<baseWeeks;
const isDeload=(w+1)%4===0;
const taperStart=totalWeeks-3;
const isTaper=w>=taperStart;
const raceWeek=w===totalWeeks-1;

// Progressive mileage
let weekMi;
if(isBase){
weekMi=12+Math.floor(w*1.5);
if(isDeload)weekMi=Math.round(weekMi*0.7);
}else{
const mw=w-baseWeeks;
weekMi=25+Math.floor(mw*1.8);
if(isTaper){
const tw=w-taperStart;
weekMi=Math.round((25+Math.floor((taperStart-baseWeeks)*1.8))*(tw===0 ? 0.75 : tw===1 ? 0.5 : 0.3));
}
if(isDeload&&!isTaper)weekMi=Math.round(weekMi*0.7);
}
weekMi=Math.min(weekMi,50);

// Distribute miles across 5 days (Mon=rest, Thu=rest)
// Tue=easy, Wed=tempo/intervals, Fri=easy, Sat=moderate, Sun=long
const longPct = isBase ? 0.3 : 0.35;
const longMi=Math.round(weekMi*longPct*10)/10;
const remaining=weekMi-longMi;
const easyMi=Math.round(remaining/4*10)/10;

const hiitMins=[10,15,20];
const days=[];
for(let d=0;d<7;d++){
const dt=addDays(wkStart,d);
const ds=dateStr(dt);
const dow=DOW[d];
let activities=[];

if(d===0||d===3){
// Rest days (Mon, Thu)
}else if(d===6){
// Sunday = long run
activities.push({type:'Long run',detail:`${longMi} mi`,miles:longMi,time:0});
if(w%3===2)activities.push({type:'HIIT',detail:`${hiitMins[w%3]} min`,miles:0,time:hiitMins[w%3]});
}else if(d===2){
// Wednesday = tempo or intervals
const type=w%2===0?'Tempo':'Intervals';
const mi=Math.round(easyMi*1.2*10)/10;
activities.push({type,detail:`${mi} mi`,miles:mi,time:0});
activities.push({type:'HIIT',detail:`${hiitMins[(w+1)%3]} min`,miles:0,time:hiitMins[(w+1)%3]});
}else{
// Tue, Fri, Sat = easy runs
const mi=d===5?Math.round(easyMi*1.3*10)/10:easyMi;
activities.push({type:'Easy run',detail:`${mi} mi`,miles:mi,time:0});
if(d===1&&w%3===0)activities.push({type:'HIIT',detail:`${hiitMins[(w+2)%3]} min`,miles:0,time:hiitMins[(w+2)%3]});
}

if(raceWeek&&d===6){
activities=[{type:'Long run',detail:'Marathon! 26.2 mi',miles:26.2,time:0}];
}

days.push({dow,date:dt,dateStr:ds,activities,actuals:null,edited:false});
}

plan.push({week:w+1,start:wkStart,days,totalMi:weekMi,isBase,isDeload,isTaper,raceWeek});
}
}

// ===== NUTRITION CALC (Mifflin-St Jeor) =====
function calcBMR(){
const wtKg=USER.wt*0.453592;
return 10*wtKg+6.25*USER.ht-5*USER.age-161;
}

function getActivityMultiplier(activities){
if(!activities||activities.length===0)return 1.35; // rest
let mult=1.35;
let hasHIIT=false;
activities.forEach(a=>{
if(a.type==='HIIT')hasHIIT=true;
else if(['Easy run','Walk'].includes(a.type)){
if(a.miles&&a.miles<4)mult=Math.max(mult,1.45);
else if(a.miles&&a.miles<8)mult=Math.max(mult,1.50);
else if(a.miles&&a.miles>=8)mult=Math.max(mult,1.60);
else mult=Math.max(mult,1.45);
}else if(['Long run','Tempo','Intervals'].includes(a.type)){
if(a.miles&&a.miles>=8)mult=Math.max(mult,1.60);
else mult=Math.max(mult,1.50);
}else if(['Hike','Bike','Mtn bike','Kayak','Swim'].includes(a.type)){
mult=Math.max(mult,1.50);
}
});
if(hasHIIT)mult+=0.05;
return mult;
}

function calcDayTargets(activities){
const bmr=calcBMR();
const mult=getActivityMultiplier(activities);
const tdee=Math.round(bmr*mult);
const cals=tdee-100; // gentle deficit
const proteinG=Math.round(USER.wt); // bodyweight in grams
const proteinCal=proteinG*4;
const isHard=activities&&activities.some(a=>['Long run','Tempo','Intervals'].includes(a.type)||(a.miles&&a.miles>=6));
const carbPct=isHard?0.50:0.45;
const carbCal=Math.round((cals-proteinCal)*carbPct/(1-0));
const carbG=Math.round(carbCal/4);
const fatCal=cals-proteinCal-carbCal;
const fatG=Math.max(30,Math.round(fatCal/9));
const adjCals=proteinCal+carbG*4+fatG*9;
return{cals:adjCals,protein:proteinG,carbs:carbG,fat:fatG};
}

async function searchFoodQuery(q){
document.getElementById('searchResults').innerHTML='<div style="text-align:center;color:var(--tx2);font-size:13px;padding:8px">Searching...</div>';
let data=null;
for(let attempt=0;attempt<3;attempt++){
try{
const r=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(q)}&search_simple=1&action=process&json=1&page_size=8&countries_tags=en:united-states`);
data=await r.json();
break;
}catch(e){await new Promise(r=>setTimeout(r,500))}
}
if(!data||!data.products||data.products.length===0){
document.getElementById('searchResults').innerHTML='<div style="color:var(--tx2);font-size:13px;padding:4px">No results. Try a different term or use manual entry.</div>';
return;
}
let html='';
data.products.slice(0,6).forEach(p=>{
const name=p.product_name||'Unknown';
const brand=p.brands||'';
const cal=Math.round(p.nutriments?.['energy-kcal_100g']||p.nutriments?.['energy-kcal']||0);
const prot=Math.round((p.nutriments?.proteins_100g||0)*10)/10;
const carb=Math.round((p.nutriments?.carbohydrates_100g||0)*10)/10;
const fat=Math.round((p.nutriments?.fat_100g||0)*10)/10;
const serving=p.serving_size||'100g';
html+=`<div style="padding:8px 0;border-bottom:.5px solid #f0f0ec;cursor:pointer" onclick='openFoodConfirm(${JSON.stringify({name:name+(brand?' ('+brand+')':''),cal,p:prot,c:carb,f:fat,serving,per100g:true}).replace(/'/g,"\\'")})'><div style="font-size:14px;font-weight:500">${name}${brand?' <span style="color:var(--tx2);font-size:12px">'+brand+'</span>':''}</div><div style="font-size:12px;color:var(--tx2)">${cal} cal · ${prot}p ${carb}c ${fat}f per 100g</div></div>`;
});
document.getElementById('searchResults').innerHTML=html;
}

function updateFoodPreview(){

const amt=parseFloat(document.getElementById('foodAmt')?.value||1);

const cal=Math.round(pendingFood.cal*mult);
const p=Math.round(pendingFood.p*mult*10)/10;
const c=Math.round(pendingFood.c*mult*10)/10;
const f=Math.round(pendingFood.f*mult*10)/10;
const el=document.getElementById('foodPreview');

function renderWeightChart(){
const canvas=document.getElementById('wtChart');
const ctx=canvas.getContext('2d');
const W=canvas.offsetWidth;const H=180;
canvas.width=W*2;canvas.height=H*2;
ctx.scale(2,2);
ctx.clearRect(0,0,W,H);
const data=weightHist.length>0?weightHist:[{date:todayStr(),wt:USER.wt}];
const vals=data.map(d=>d.wt);
const mn=Math.min(...vals,USER.goalWt)-2;
const mx=Math.max(...vals)+2;
const L=40,R=W-10,T=15,B=H-25;

// Y axis
ctx.fillStyle='#b5b3ac';ctx.font='500 9px Sora';ctx.textAlign='right';
for(let i=0;i<=4;i++){
const v=mn+(mx-mn)*i/4;
const y=B-(i/4)*(B-T);
ctx.fillText(Math.round(v*10)/10,L-4,y+3);
ctx.strokeStyle='#eee';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(L,y);ctx.lineTo(R,y);ctx.stroke();
}

// Goal line
const goalY=B-((USER.goalWt-mn)/(mx-mn))*(B-T);
ctx.strokeStyle='var(--acc)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
ctx.beginPath();ctx.moveTo(L,goalY);ctx.lineTo(R,goalY);ctx.stroke();
ctx.setLineDash([]);
ctx.fillStyle='#1D9E75';ctx.font='500 8px Sora';ctx.textAlign='left';
ctx.fillText(`Goal: ${USER.goalWt}`,R-60,goalY-4);

// Data line
if(data.length>1){
ctx.strokeStyle='#378ADD';ctx.lineWidth=2;ctx.beginPath();
data.forEach((d,i)=>{
const x=L+i*(R-L)/(data.length-1);
const y=B-((d.wt-mn)/(mx-mn))*(B-T);
i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
});
ctx.stroke();
}
// Dots
data.forEach((d,i)=>{
const x=data.length===1?L+(R-L)/2:L+i*(R-L)/(data.length-1);
const y=B-((d.wt-mn)/(mx-mn))*(B-T);
ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#378ADD';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
});

// X labels
ctx.fillStyle='#b5b3ac';ctx.font='500 8px Sora';ctx.textAlign='center';
data.forEach((d,i)=>{
if(data.length<=10||i%Math.ceil(data.length/6)===0){
const x=data.length===1?L+(R-L)/2:L+i*(R-L)/(data.length-1);
const lbl=d.date.slice(5);
ctx.fillText(lbl,x,H-6);
}
});
}

function renderMileageChart(){
const canvas=document.getElementById('miChart');
const ctx=canvas.getContext('2d');
const W=canvas.offsetWidth;const H=180;
canvas.width=W*2;canvas.height=H*2;
ctx.scale(2,2);
ctx.clearRect(0,0,W,H);

const wks=plan.slice(0,Math.min(plan.length,30));
if(wks.length===0)return;
const L=30,R=W-10,T=15,B=H-25;
const planned=wks.map(w=>w.totalMi);
const actual=wks.map(w=>w.days.reduce((s,d)=>s+(d.actuals?d.actuals.reduce((t,a)=>t+(a.miles||0),0):0),0));
const mx=Math.max(...planned,...actual,1);

// Y axis
ctx.fillStyle='#b5b3ac';ctx.font='500 9px Sora';ctx.textAlign='right';
for(let i=0;i<=4;i++){
const v=Math.round(mx*i/4);
const y=B-(i/4)*(B-T);
ctx.fillText(v,L-4,y+3);
ctx.strokeStyle='#eee';ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(L,y);ctx.lineTo(R,y);ctx.stroke();
}

const bw=Math.max(4,Math.min(16,(R-L)/wks.length-3));

// Green bars (planned)
planned.forEach((p,i)=>{
const x=L+i*((R-L)/wks.length)+2;
const h=(p/mx)*(B-T);
ctx.fillStyle='rgba(29,158,117,.25)';
ctx.fillRect(x,B-h,bw,h);
});

// Coral line (actual)
const hasActual=actual.some(a=>a>0);
if(hasActual){
ctx.strokeStyle='#D85A30';ctx.lineWidth=2;ctx.beginPath();
let started=false;
actual.forEach((a,i)=>{
if(a===0&&!started)return;
const x=L+i*((R-L)/wks.length)+2+bw/2;
const y=B-(a/mx)*(B-T);
if(!started){ctx.moveTo(x,y);started=true}else ctx.lineTo(x,y);
});
ctx.stroke();
actual.forEach((a,i)=>{
if(a===0)return;
const x=L+i*((R-L)/wks.length)+2+bw/2;
const y=B-(a/mx)*(B-T);
ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#D85A30';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();
});
}

// X labels
ctx.fillStyle='#b5b3ac';ctx.font='500 8px Sora';ctx.textAlign='center';
wks.forEach((w,i)=>{
if(wks.length<=15||i%Math.ceil(wks.length/10)===0){
const x=L+i*((R-L)/wks.length)+2+bw/2;
ctx.fillText('W'+w.week,x,H-6);
}
});
}

function openModal(id){document.getElementById(id).classList.add('on')}
function closeModal(id){document.getElementById(id).classList.remove('on')}
document.querySelectorAll('.modal-bg').forEach(m=>{
m.addEventListener('click',e=>{if(e.target===m){
if(m.id==='barcodeModal')closeBarcodeModal();
else m.classList.remove('on');
}});
});

// ===== INIT =====
async function init(){
buildPlan();
try{
await openDB();
await loadData();
}catch(e){console.warn('DB load error:',e)}
curWeek=getWeekIndex();
try{render()}catch(e){console.error('Render error:',e)}
}
init();
</script>
